# ============================================================
# 部署位置: 39.97.248.52 的 Nginx
# 文件路径: /etc/nginx/conf.d/aiwiki.conf
# 作用: 将公网请求代理到内网 172.17.18.87
# ============================================================

upstream aiwiki_backend {
    server 172.17.18.87:8090;
    keepalive 32;
}

upstream aiwiki_frontend {
    server 172.17.18.87:5001;
    keepalive 16;
}

server {
    listen 80;
    server_name 39.97.248.52;  # 如有域名可改为域名

    # 上传文件大小限制（资料导入）
    client_max_body_size 100m;

    # ---------- 后端 API ----------
    location /api/ {
        proxy_pass         http://aiwiki_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE 长连接（摄入任务进度推送）
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        chunked_transfer_encoding on;
    }

    # ---------- 前端 SPA ----------
    location / {
        proxy_pass         http://aiwiki_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # SPA 刷新 404 容错
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    location @fallback {
        proxy_pass http://aiwiki_frontend;
    }
}
