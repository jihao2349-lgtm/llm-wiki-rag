services:
  mysql:
    image: m.daocloud.io/docker.io/mysql:8.0
    container_name: aiwiki-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: aiwiki
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  redis:
    image: m.daocloud.io/docker.io/redis:7-alpine
    container_name: aiwiki-redis
    restart: unless-stopped
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
    image: aiwiki-backend:latest
    container_name: aiwiki-backend
    restart: unless-stopped
    environment:
      AIWIKI_DATASOURCE_URL: jdbc:mysql://mysql:3306/aiwiki?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      AIWIKI_DATASOURCE_USERNAME: root
      AIWIKI_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      AIWIKI_REDIS_HOST: redis
      AIWIKI_REDIS_PORT: 6379
      AIWIKI_REDIS_DATABASE: 0
      AIWIKI_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_AI_OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_AI_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-placeholder}
    volumes:
      - ${OBSIDIAN_VAULT_PATH}:/obsidian:rw
    ports:
      - "8090:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      args:
        # 浏览器直接访问的后端地址（Nginx 公网地址）
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: aiwiki-frontend:latest
    container_name: aiwiki-frontend
    restart: unless-stopped
    ports:
      - "4001:80"
    depends_on:
      - backend

volumes:
  mysql_data:
