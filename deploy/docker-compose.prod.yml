services:
  backend:
    build:
      context: ../backend
    image: aiwiki-backend:latest
    container_name: aiwiki-backend
    restart: unless-stopped
    # 让容器能通过 host.docker.internal 访问宿主机上的 MySQL/Redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AIWIKI_DATASOURCE_URL: jdbc:mysql://host.docker.internal:${MYSQL_PORT:-3306}/aiwiki?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      AIWIKI_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      AIWIKI_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      AIWIKI_REDIS_HOST: host.docker.internal
      AIWIKI_REDIS_PORT: ${REDIS_PORT:-6379}
      AIWIKI_REDIS_DATABASE: ${REDIS_DATABASE:-1}
      AIWIKI_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_AI_OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_AI_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-placeholder}
    volumes:
      - ${OBSIDIAN_VAULT_PATH}:/obsidian:rw
    ports:
      - "8090:8080"

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: aiwiki-frontend:latest
    container_name: aiwiki-frontend
    restart: unless-stopped
    ports:
      - "4001:80"
    depends_on:
      - backend
